name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section for this tag
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Extract from ## [vX.Y.Z] to next ## or end
          awk -v tag="$TAG" '
            $0 ~ "^## \\["tag"\\]" {p=1; getline; next}
            p && $0 ~ /^## / {p=0}
            p {print}
          ' CHANGELOG.md > body.md || true  # don't fail if file missing

          # Fallback to full changelog if section not found or empty
          [ -s body.md ] || cp CHANGELOG.md body.md

          # Trim leading/trailing empty lines
          sed -i '/./,$!d' body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: body.md
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
